<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Profile - SocialMedia</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation Header -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 md:px-20 lg:px-40 py-4 sticky top-0 z-10">
<div class="flex items-center gap-4">
<div class="text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight">Edit Profile</h2>
</div>
<button class="flex min-w-[100px] cursor-pointer items-center justify-center rounded-xl h-11 px-6 bg-primary hover:bg-primary/90 text-white text-sm font-bold transition-colors">
<span>Save</span>
</button>
</header>
<main class="flex-1 flex justify-center py-8 px-4">
<div class="layout-content-container flex flex-col max-w-[640px] flex-1 gap-8">
<!-- Profile Photo Section -->
<div class="flex flex-col items-center gap-6 bg-white dark:bg-slate-900 p-8 rounded-xl border border-slate-200 dark:border-slate-800">
<div class="relative group">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-32 w-32 border-4 border-primary/10" data-alt="User profile portrait showing a smiling face" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAcS6CXJwKTFBuat5gfw1TU7al2yqP6DrkB1A07p6a-vuMm9cClLqy_JLpy0gmVf4hqF-f7u_gTa9dzyTdmjV9ow2A8cmYCQ7n78tutkMn7Quq4nXOlOI6jBpB82bTX39dzLRSu6kvSRTT0GK7kXQ1maR0DRO5FGIN9aZAgk3EsgNlE7tMnsAtB75cUHSNa7U-NH4eXXcFIk_IPIaKd_L6DfcnVKCoqaiwcDg4l4rn8t-nHUJTNAiFUeEFrZYnpzn-GDVNfAX12mcJC");'>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg border-2 border-white dark:border-slate-900 flex items-center justify-center">
<span class="material-symbols-outlined text-sm">photo_camera</span>
</button>
</div>
<div class="text-center">
<h3 class="text-slate-900 dark:text-slate-100 text-2xl font-bold">John Doe</h3>
<button class="text-primary font-semibold text-sm mt-1 hover:underline">Change Profile Photo</button>
</div>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-6 bg-white dark:bg-slate-900 p-8 rounded-xl border border-slate-200 dark:border-slate-800">
<!-- Readonly Email Field -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Email Address</label>
<span class="text-xs text-slate-500 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">lock</span> Read only
                                </span>
</div>
<div class="flex w-full items-center rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 h-14 px-4 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined mr-3 text-slate-400">mail</span>
<span class="text-base">johndoe@example.com</span>
</div>
</div>
<!-- Name Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
<input class="form-input flex w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:border-primary focus:ring-1 focus:ring-primary h-14 pl-12 pr-4 text-slate-900 dark:text-slate-100 text-base transition-all" placeholder="Enter your name" type="text" value="John Doe"/>
</div>
</div>
<!-- Profile Picture URL Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Profile Picture URL</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">link</span>
<input class="form-input flex w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:border-primary focus:ring-1 focus:ring-primary h-14 pl-12 pr-4 text-slate-900 dark:text-slate-100 text-base transition-all" placeholder="https://example.com/photo.jpg" type="url" value="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde"/>
</div>
</div>
<!-- Bio Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Bio</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-4 text-slate-400">description</span>
<textarea class="form-input flex w-full min-h-[120px] rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:border-primary focus:ring-1 focus:ring-primary pl-12 pr-4 py-3 text-slate-900 dark:text-slate-100 text-base transition-all resize-none" placeholder="Tell us about yourself...">Digital creator and photographer. Exploring the world one frame at a time. 📸✨</textarea>
</div>
<p class="text-xs text-slate-500 text-right italic">Max 160 characters</p>
</div>
</div>
<!-- Additional Actions -->
<div class="flex items-center justify-between px-2">
<button class="text-red-500 font-semibold text-sm hover:text-red-600 flex items-center gap-2">
<span class="material-symbols-outlined text-lg">delete</span>
                            Deactivate Account
                        </button>
<p class="text-slate-500 text-xs">Member since January 2024</p>
</div>
</div>
</main>
<!-- Bottom Spacer -->
<footer class="py-10"></footer>
</div>
</div>
</body></html>
